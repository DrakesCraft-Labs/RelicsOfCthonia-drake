<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" width="920" height="300">
  <defs>
    <linearGradient id="addonBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <linearGradient id="addonColor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
  </defs>

  <style>
    @keyframes addonPulse {
      0%, 100% { opacity: 0.85; filter: drop-shadow(0 0 15px #EF4444); }
      50% { opacity: 1; filter: drop-shadow(0 0 30px #38BDF8); }
    }
    .bg-a { fill: url(#addonBg); }
    .title-a { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 42px; fill: url(#addonColor); animation: addonPulse 3.5s infinite ease-in-out; }
    .sub-a { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px; fill: #94A3B8; letter-spacing: 3px; }
    .badge-a { fill: #0F172A; stroke: #EF4444; stroke-width: 1.5; rx: 6px; }
    .btext-a { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; fill: #EF4444; }
  </style>

  <rect class="bg-a" width="920" height="300" rx="14" stroke="#EF4444" stroke-width="1.5" />

  <g transform="translate(460, 95)">
    <polygon points="0,-42 34,-20 34,20 0,42 -34,20 -34,-20" fill="#0F172A" stroke="url(#addonColor)" stroke-width="3" />
    <circle cx="0" cy="0" r="10" fill="#EF4444" />
  </g>

  <text x="460" y="185" text-anchor="middle" class="title-a">RELICSOFCTHONIA DRAKE</text>
  <text x="460" y="215" text-anchor="middle" class="sub-a">ANCIENT MAGIC & WEAPONS · RUST FFM HYBRID ACCELERATED</text>

  <g transform="translate(230, 245)">
    <rect x="0" y="0" width="145" height="30" class="badge-a" />
    <text x="12" y="20" class="btext-a">RELICSOFCTHONIA ADDON</text>

    <rect x="165" y="0" width="150" height="30" class="badge-a" stroke="#FF4500" />
    <text x="177" y="20" class="btext-a" fill="#FF7300">RUST FFM HYBRID</text>

    <rect x="335" y="0" width="135" height="30" class="badge-a" stroke="#38BDF8" />
    <text x="347" y="20" class="btext-a" fill="#38BDF8">PAPER 1.21.11</text>
  </g>
</svg>